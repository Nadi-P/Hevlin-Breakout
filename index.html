<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="style.css" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#eaf6ff" />
<title>Breakout — A Gift for Hevlin</title>
</head>
<body>
<div id="app">
  <div class="hud">
    <div class="hud-col">
      <div class="pill">Level <span id="lvl">1</span>/5</div>
      <button id="muteBtn" class="mute-btn" aria-label="toggle music">
        <svg class="ic-on" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
        <svg class="ic-off" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M11 5 6 9H3v6h3l5 4z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>
      </button>
    </div>
    <div class="pill">Score <span id="score">0</span></div>
    <div class="pill lives">♥ <span id="lives">3</span></div>
  </div>
  <div id="stage">
    <canvas id="game"></canvas>
    <div class="toast" id="toast"></div>
    <div class="overlay" id="overlay">
      <div class="card">
        <h1 id="ovTitle">For Hevlin 💙</h1>
        <p id="ovText">Drag your finger to move the paddle. Catch power-ups to make magic happen!</p>
        <div class="legend" id="legend">
          <span><span class="dot multi"></span>+3 balls</span>
          <span><span class="dot triple"></span>Triple all!</span>
        </div>
        <button class="btn" id="ovBtn">Start</button>
      </div>
    </div>
    <div id="greeting" class="greeting"></div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
